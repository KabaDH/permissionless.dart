name: Publish permissionless_passkeys

on:
  push:
    # GitHub tag filters are globs, not regex: `.` is a literal dot, and the
    # trailing `*` admits pre-release / build-metadata suffixes like
    # `-pre.1`, `-rc.2`, or `+hotfix` so those still trigger publishing.
    tags:
      - 'permissionless_passkeys-v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run dart pub publish --dry-run without actually publishing'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  # Never cancel an in-flight pub.dev publish — a half-run release would be
  # worse than a delayed one. Serialize releases by group instead.
  group: publish-permissionless-passkeys
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'push'
    permissions:
      id-token: write  # required for OIDC trusted publishing
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@65eb853c7ba17dde3be364c3d2858773e7144260  # v1.7.2
    with:
      environment: release
      working-directory: packages/permissionless_passkeys

  dry-run:
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Dry-run publish
        run: dart pub publish --dry-run
        working-directory: packages/permissionless_passkeys
