name: Verify
on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze

      - name: Check README versions match pubspec.yaml
        run: make check-readme

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Test permissionless
        run: dart test -P quick --reporter expanded
        working-directory: packages/permissionless

      - name: Test permissionless_passkeys
        run: flutter test
        working-directory: packages/permissionless_passkeys
