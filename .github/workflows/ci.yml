name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  permissionless:
    name: permissionless
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/permissionless
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          flutter-version: "3.41.7"
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: .

      - name: Analyze
        run: dart analyze

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run tests
        run: dart test -P quick --reporter expanded

  permissionless_passkeys:
    name: permissionless_passkeys
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/permissionless_passkeys
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          flutter-version: "3.41.7"
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: .

      - name: Analyze
        run: flutter analyze

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run tests
        run: flutter test
