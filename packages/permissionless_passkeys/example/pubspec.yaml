name: permissionless_passkeys_example
description: Example app demonstrating WebAuthn passkey authentication with smart accounts
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.10.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  permissionless_passkeys: ^0.1.2
  permissionless: ^0.4.1
  web3_signers: ^1.0.0
  flutter_riverpod: ^3.3.2
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
